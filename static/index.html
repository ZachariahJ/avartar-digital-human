<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBIRT Counselor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #ffffff; height: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }

.header { text-align: center; padding: 10px; background: #16213e; border-bottom: 1px solid #0f3460; }
.header h1 { font-size: 1.3em; color: #e94560; }

.main { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

/* Avatar panel — top, centered */
.avatar-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: #111; flex: 0 0 auto; padding: 10px 0; }
.video-container { position: relative; width: 280px; height: 280px; }
.video-container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; border-radius: 12px; transition: opacity 0.1s linear; background: #111; }
.video-container video.hidden-video { opacity: 0; z-index: 0; }
.video-container video.active-video { opacity: 1; z-index: 1; }
.subtitle-bar { width: 100%; max-width: 500px; text-align: center; padding: 8px 16px; font-size: 0.95em; min-height: 32px; color: #ccc; }

/* Chat panel — bottom, scrollable */
.chat-panel { flex: 1; display: flex; flex-direction: column; border-top: 1px solid #0f3460; min-height: 0; }
.chat-messages { flex: 1; overflow-y: auto; padding: 10px 16px; }
.msg { margin-bottom: 8px; padding: 8px 12px; border-radius: 8px; max-width: 80%; word-wrap: break-word; font-size: 0.9em; }
.msg.user { background: #0f3460; margin-left: auto; }
.msg.assistant { background: #1a1a3e; border: 1px solid #0f3460; }
.msg .role { font-size: 0.7em; color: #888; margin-bottom: 2px; }

/* Controls */
.controls { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: #16213e; border-top: 1px solid #0f3460; }
.controls input[type="text"] { flex: 1; padding: 8px 12px; border-radius: 6px; border: 1px solid #0f3460; background: #1a1a2e; color: #e0e0e0; font-size: 0.9em; }
.controls button { padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.9em; font-weight: 500; }
.btn-start { background: #e94560; color: white; }
.btn-start.active { background: #4ecca3; }
.btn-send { background: #0f3460; color: white; }
.btn-clear { background: #333; color: #ccc; }
.controls button:hover { opacity: 0.85; }

.status-bar { text-align: center; padding: 5px; background: #111; font-size: 0.8em; color: #888; }
</style>
</head>
<body>

<div class="header">
  <h1>SBIRT Counselor</h1>
</div>

<div class="main">
  <div class="avatar-panel">
    <div class="video-container">
      <video id="videoA" class="active-video" muted playsinline></video>
      <video id="videoB" class="hidden-video" muted playsinline></video>
    </div>
    <div class="subtitle-bar" id="subtitle"></div>
  </div>
  <div class="chat-panel">
    <div class="chat-messages" id="chatMessages"></div>
  </div>
</div>

<div class="controls">
  <button class="btn-start" id="btnStart">Start</button>
  <input type="text" id="textInput" placeholder="Type a message..." />
  <button class="btn-send" id="btnSend">Send</button>
  <button class="btn-clear" id="btnClear">Clear</button>
</div>
<div class="status-bar" id="statusBar">Click Start to begin</div>

<script>
(function() {
  // ============ Elements ============
  const videoA = document.getElementById('videoA');
  const videoB = document.getElementById('videoB');
  const subtitle = document.getElementById('subtitle');
  const chatMessages = document.getElementById('chatMessages');
  const btnStart = document.getElementById('btnStart');
  const btnSend = document.getElementById('btnSend');
  const btnClear = document.getElementById('btnClear');
  const textInput = document.getElementById('textInput');
  const statusBar = document.getElementById('statusBar');

  const IDLE_VIDEO_URL = '/video/assets/idle_loop.mp4';
  let micActive = false;
  let endedByDecline = false;   // session ended (consent declined) — next Start is fresh

  // Per-browser session id: isolates this tab's conversation/avatar/mic on the
  // server from every other connected user. Sent on both WebSockets and all
  // HTTP calls.
  // Persist the session id in sessionStorage so a page reload rejoins the SAME
  // server session (the connect snapshot then restores the transcript) instead of
  // silently discarding the conversation. Per-tab; a new tab gets its own session.
  let SESSION_ID = sessionStorage.getItem('sid');
  if (!SESSION_ID) {
    SESSION_ID = (window.crypto && crypto.randomUUID)
      ? crypto.randomUUID()
      : 'sid-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    sessionStorage.setItem('sid', SESSION_ID);
  }
  const SID_Q = '?sid=' + encodeURIComponent(SESSION_ID);

  // ============ Double-buffered Video ============
  // Two stacked <video> elements. We NEVER change the src of the visible one
  // (that would blank it to black). New clips are always loaded into the hidden
  // buffer and shown by swapping opacity once their first frame is decoded.
  let activeVideo = videoA;     // currently visible element
  let preloadVideo = videoB;    // hidden buffer being loaded
  const videoQueue = [];        // items not yet loaded into the buffer
  let current = null;           // item shown on activeVideo (segment, or idle)
  let preloadItem = null;       // item loaded/loading into preloadVideo
  let preloadReady = false;     // preloadVideo has a decodable first frame
  let responseEnded = false;    // server sent video_end → ok to dissolve to idle when drained
  let waitingForNext = false;   // a segment ended; holding its last frame until next is ready

  const IDLE_ITEM = { url: IDLE_VIDEO_URL, text: '', idle: true };

  function swapToPreload() {
    // preloadVideo already holds a decoded frame for preloadItem.
    activeVideo.classList.replace('active-video', 'hidden-video');
    preloadVideo.classList.replace('hidden-video', 'active-video');
    const old = activeVideo;
    activeVideo = preloadVideo;
    preloadVideo = old;

    current = preloadItem;
    preloadItem = null;
    preloadReady = false;
    waitingForNext = false;

    activeVideo.loop = !!current.idle;
    activeVideo.muted = current.idle ? !micActive : false;
    // Always start from the beginning: without autoplay the buffer won't have
    // advanced, but reset defensively so a swapped-in clip never starts mid-way.
    try { activeVideo.currentTime = 0; } catch (e) {}
    activeVideo.play().catch(() => {});
    subtitle.textContent = current.text || '';
    if (current.idle) {
      // Back to idle: playback has truly drained, so it's the user's turn now.
      statusBar.textContent = micActive ? 'Ready - speak now' : 'Click Start to begin';
    }

    // Free the now-hidden buffer and start loading whatever comes next.
    old.pause();
    loadNextIntoPreload();
  }

  function isPlayingSpeech() {
    return (current && !current.idle) || videoQueue.length > 0 ||
           (preloadItem && !preloadItem.idle) || waitingForNext;
  }

  function loadNextIntoPreload() {
    if (preloadItem) return;                 // buffer already busy
    let next = null;
    if (videoQueue.length > 0) {
      next = videoQueue.shift();
    } else if (responseEnded && !(current && current.idle)) {
      next = IDLE_ITEM;                       // response done → prepare clean dissolve to idle
    } else {
      return;                                 // nothing to preload yet
    }
    preloadItem = next;
    preloadReady = false;
    preloadVideo.muted = true;                // keep buffer silent until shown
    preloadVideo.src = next.url;
    preloadVideo.load();
  }

  function onPreloadReady(e) {
    if (e.target !== preloadVideo || !preloadItem) return;
    preloadReady = true;
    // Swap right away if we're idle (new speech arrived) or holding a finished
    // segment's last frame. Otherwise the swap happens when the current clip ends.
    if (waitingForNext || (current && current.idle)) {
      swapToPreload();
    }
  }
  videoA.addEventListener('canplay', onPreloadReady);
  videoB.addEventListener('canplay', onPreloadReady);

  function onEnded(e) {
    if (e.target !== activeVideo) return;
    if (current && current.idle) {
      activeVideo.play().catch(() => {});    // idle should loop; restart defensively
      return;
    }
    // A segment finished.
    if (preloadReady && preloadItem) {
      swapToPreload();                        // next clip ready → seamless swap
    } else {
      waitingForNext = true;                  // hold last frame (no black flash, no idle bounce)
      loadNextIntoPreload();                  // ensure something is loading
    }
  }
  videoA.addEventListener('ended', onEnded);
  videoB.addEventListener('ended', onEnded);

  function onVideoError(e) {
    // A clip failed to load/decode (404, janitor-deleted, network). Never freeze:
    // skip a failed buffer clip, or treat a failed active clip like a normal end.
    if (e.target === preloadVideo && preloadItem && !preloadItem.idle) {
      preloadItem = null;
      preloadReady = false;
      loadNextIntoPreload();
    } else if (e.target === activeVideo && current && !current.idle) {
      onEnded({ target: activeVideo });
    }
  }
  videoA.addEventListener('error', onVideoError);
  videoB.addEventListener('error', onVideoError);

  function enqueueVideo(url, text) {
    responseEnded = false;
    videoQueue.push({ url, text });
    // If we were about to dissolve back to idle, cancel that — real speech wins.
    if (preloadItem && preloadItem.idle) {
      preloadItem = null;
      preloadReady = false;
    }
    loadNextIntoPreload();
  }

  function startIdle() {
    // Initial idle on page load (no swap needed since nothing is playing yet).
    current = IDLE_ITEM;
    preloadItem = null;
    preloadReady = false;
    waitingForNext = false;
    activeVideo.loop = true;
    activeVideo.muted = !micActive;
    if (!activeVideo.src.endsWith('idle_loop.mp4')) {
      activeVideo.src = IDLE_VIDEO_URL;
    }
    activeVideo.play().catch(() => {});
    subtitle.textContent = '';
  }

  function interruptPlayback() {
    // Barge-in / stop / reset: drop everything queued/buffered so the previous
    // answer can't play into the next turn, then dissolve to idle THROUGH the hidden
    // buffer. We never change the visible element's src (that caused a black flash);
    // the current last frame is held until the idle clip is decoded, then swapped.
    videoQueue.length = 0;
    preloadItem = null;
    preloadReady = false;
    try { activeVideo.pause(); } catch (e) {}
    try { preloadVideo.pause(); } catch (e) {}
    if (current && current.idle) {
      waitingForNext = false;
      responseEnded = false;
      return;                 // already idle — nothing to dissolve to
    }
    waitingForNext = true;    // hold the current last frame until idle is ready
    responseEnded = true;     // lets loadNextIntoPreload prepare the idle clip
    loadNextIntoPreload();    // preload idle → onPreloadReady swaps (dissolve, no flash)
  }

  // Start with idle
  startIdle();

  // ============ State WebSocket ============
  let stateWs = null;

  function connectStateWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    stateWs = new WebSocket(proto + '//' + location.host + '/ws/state' + SID_Q);
    stateWs.onopen = () => console.log('[State] WS connected');
    stateWs.onclose = () => {
      console.log('[State] WS disconnected, reconnecting...');
      setTimeout(connectStateWS, 2000);
    };
    stateWs.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      handleStateMessage(msg);
    };
  }

  let chatState = [];   // [{role, content}] mirror of the server-side chat

  function handleStateMessage(msg) {
    if (msg.type === 'chat') {
      applyChatDelta(msg);
    } else if (msg.type === 'video') {
      enqueueVideo(msg.video_url, msg.subtitle || '');
      statusBar.textContent = 'Speaking: ' + (msg.subtitle || '').slice(0, 60);
    } else if (msg.type === 'video_end') {
      // Response done. Once the remaining clips drain, dissolve cleanly back to
      // idle (the idle clip is preloaded into the hidden buffer, never src-swapped
      // onto the visible one). Kick off that preload now if we're already idling.
      responseEnded = true;
      loadNextIntoPreload();
    } else if (msg.type === 'state') {
      const s = msg.state || 'idle';
      if (s === 'listening') {
        // User started speaking (barge-in): stop the current answer at once.
        interruptPlayback();
        statusBar.textContent = 'Listening...';
      }
      else if (s === 'processing') statusBar.textContent = 'Processing...';
      else if (s === 'speaking') { /* keep current subtitle status */ }
      else {
        // The server goes idle BEFORE the browser finishes playing buffered clips.
        // Only announce "ready" once playback has actually drained; otherwise the
        // swap-to-idle in swapToPreload will set it at the right moment.
        if (!isPlayingSpeech()) {
          statusBar.textContent = micActive ? 'Ready - speak now' : 'Click Start to begin';
        }
      }
    } else if (msg.type === 'reset') {
      chatState = [];
      chatMessages.innerHTML = '';
      interruptPlayback();
      statusBar.textContent = 'Click Start to begin';
    } else if (msg.type === 'stop') {
      // Conversation ended (consent declined): stop capturing and reset to Start,
      // but do NOT interrupt playback — let the goodbye clip finish, then it
      // dissolves to idle on its own. The next Start begins a fresh session.
      endedByDecline = true;
      if (micActive) {
        stopMic();
        micActive = false;
        btnStart.textContent = 'Start';
        btnStart.classList.remove('active');
      }
    }
  }

  function makeMsgNode(m) {
    const div = document.createElement('div');
    div.className = 'msg ' + m.role;
    div.dataset.role = m.role;
    const roleDiv = document.createElement('div');
    roleDiv.className = 'role';
    roleDiv.textContent = m.role === 'user' ? 'You' : 'Assistant';
    div.appendChild(roleDiv);
    div.appendChild(document.createTextNode(m.content));  // lastChild = content text
    return div;
  }

  // Apply an incremental chat update. The server sends only the changed suffix
  // (msg.from = first changed index, msg.msgs = messages from there on). We
  // reconcile in place: the streaming assistant bubble's TEXT is updated on its
  // existing node (so text selection isn't wiped and there's no flicker); nodes are
  // only created/replaced when the role differs. Scrollback is preserved unless the
  // user is already at the bottom.
  function applyChatDelta(msg) {
    const from = msg.from | 0;
    const atBottom = chatMessages.scrollTop + chatMessages.clientHeight
                     >= chatMessages.scrollHeight - 40;
    chatState.length = from;
    for (const m of (msg.msgs || [])) chatState.push(m);
    while (chatMessages.children.length > chatState.length) {
      chatMessages.removeChild(chatMessages.lastChild);
    }
    for (let i = from; i < chatState.length; i++) {
      const m = chatState[i];
      const node = chatMessages.children[i];
      if (node && node.dataset.role === m.role) {
        node.lastChild.textContent = m.content;           // update in place
      } else if (node) {
        chatMessages.replaceChild(makeMsgNode(m), node);
      } else {
        chatMessages.appendChild(makeMsgNode(m));
      }
    }
    if (atBottom) chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  connectStateWS();

  // ============ Audio Capture ============
  let audioWs = null;
  let audioCtx = null;
  let mediaStream = null;
  let processor = null;
  let source = null;

  function connectAudioWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    audioWs = new WebSocket(proto + '//' + location.host + '/ws/audio' + SID_Q);
    audioWs.binaryType = 'arraybuffer';
    audioWs.onopen = () => console.log('[Audio] WS connected');
    audioWs.onclose = () => {
      console.log('[Audio] WS disconnected, reconnecting...');
      if (micActive) setTimeout(connectAudioWS, 2000);
    };
  }

  async function startMic() {
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          channelCount: 1,
          // AEC (echo cancellation) cancels the avatar's own voice leaking from the
          // speaker back into the mic -> prevents false barge-in. ANC = noise
          // suppression. AGC = auto gain. Advanced {ideal:true} form so unsupported
          // constraints degrade instead of failing getUserMedia.
          echoCancellation: { ideal: true },
          noiseSuppression: { ideal: true },
          autoGainControl: { ideal: true },
          // Chrome ML 'voice isolation' — stronger background-noise removal where
          // available; silently ignored elsewhere.
          voiceIsolation: { ideal: true },
        }
      });
      // Use native sample rate and resample to 16kHz
      audioCtx = new AudioContext();
      const nativeSR = audioCtx.sampleRate;
      console.log('[Audio] Native sample rate:', nativeSR);
      source = audioCtx.createMediaStreamSource(mediaStream);

      // Use larger buffer for higher native sample rates
      const bufSize = nativeSR > 16000 ? 8192 : 4096;
      processor = audioCtx.createScriptProcessor(bufSize, 1, 1);
      processor.onaudioprocess = (e) => {
        if (audioWs && audioWs.readyState === WebSocket.OPEN) {
          const f32 = e.inputBuffer.getChannelData(0);
          // Resample to 16kHz
          const ratio = nativeSR / 16000;
          const outLen = Math.floor(f32.length / ratio);
          const i16 = new Int16Array(outLen);
          for (let i = 0; i < outLen; i++) {
            const srcIdx = i * ratio;
            const idx = Math.floor(srcIdx);
            const frac = srcIdx - idx;
            const s0 = f32[idx] || 0;
            const s1 = f32[Math.min(idx + 1, f32.length - 1)] || 0;
            const s = s0 + frac * (s1 - s0); // linear interpolation
            const clamped = Math.max(-1, Math.min(1, s));
            i16[i] = clamped < 0 ? clamped * 0x8000 : clamped * 0x7FFF;
          }
          audioWs.send(i16.buffer);
        }
      };
      source.connect(processor);
      // Connect through silent gain to avoid feedback (mic → speaker loop)
      const silentGain = audioCtx.createGain();
      silentGain.gain.value = 0;
      processor.connect(silentGain);
      silentGain.connect(audioCtx.destination);
      connectAudioWS();
      return true;
    } catch (err) {
      console.error('[Audio] Failed:', err);
      alert('Microphone access failed: ' + err.message);
      return false;
    }
  }

  function stopMic() {
    if (processor) { processor.disconnect(); processor = null; }
    if (source) { source.disconnect(); source = null; }
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    if (audioWs) { audioWs.close(); audioWs = null; }
  }

  // ============ Button handlers ============
  btnStart.addEventListener('click', async () => {
    if (!micActive) {
      // If the previous session ended by a consent decline, Start begins fresh:
      // clear the server conversation so the greeting fires again.
      if (endedByDecline) {
        endedByDecline = false;
        await fetch('/api/reset' + SID_Q, { method: 'POST' });
      }
      // Toggle mic on server
      const resp = await fetch('/api/toggle' + SID_Q, { method: 'POST' });
      const data = await resp.json();
      if (data.mic === 'on') {
        const ok = await startMic();
        if (ok) {
          micActive = true;
          btnStart.textContent = 'Stop';
          btnStart.classList.add('active');
          statusBar.textContent = 'Listening…';
          // Unmute video after user interaction
          activeVideo.muted = false;
          // Counselor leads: greet now that the mic is confirmed live. (Kept
          // separate from the toggle so a denied mic or a Clear never greets.)
          fetch('/api/greet' + SID_Q, { method: 'POST' });
        } else {
          // Mic denied — revert the server toggle so no phantom greeting fires.
          await fetch('/api/toggle' + SID_Q, { method: 'POST' });
        }
      }
    } else {
      await fetch('/api/toggle' + SID_Q, { method: 'POST' });
      stopMic();
      interruptPlayback();          // Stop actually stops the avatar mid-response
      micActive = false;
      btnStart.textContent = 'Start';
      btnStart.classList.remove('active');
      statusBar.textContent = 'Stopped';
    }
  });

  btnSend.addEventListener('click', sendText);
  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendText();
  });

  async function sendText() {
    const text = textInput.value.trim();
    if (!text) return;
    textInput.value = '';
    interruptPlayback();   // typing interrupts the current answer immediately
    await fetch('/api/text' + SID_Q, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    statusBar.textContent = 'Processing...';
  }

  btnClear.addEventListener('click', async () => {
    // api_reset already disables the mic server-side and returns the mic state, so
    // we must NOT issue a second /api/toggle here (that flipped the server back ON,
    // desyncing the toggle so the next Start was a silent no-op, and — with greeting
    // tied to the toggle — fired a phantom greeting). Just tear down locally.
    await fetch('/api/reset' + SID_Q, { method: 'POST' });
    chatState = [];
    chatMessages.innerHTML = '';
    subtitle.textContent = '';
    statusBar.textContent = 'Click Start to begin';
    if (micActive) {
      stopMic();
      micActive = false;
      btnStart.textContent = 'Start';
      btnStart.classList.remove('active');
    }
  });
})();
</script>
</body>
</html>
